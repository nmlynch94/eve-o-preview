name: EZRep Build

on:
  push:
    branches: master
  workflow_dispatch:

jobs:
  build:

    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
    - name: Install .NET Framework 4.8 Developer Pack via Chocolatey
      run: |
        choco install netfx-4.8-devpack -y --no-progress
    - name: Restore dependencies
      run: dotnet restore src/Eve-O-Preview/Eve-O-Preview.csproj
    - name: Build
      run: dotnet build --no-restore src/Eve-O-Preview/Eve-O-Preview.csproj
    - name: Test
      run: dotnet test --no-build --verbosity normal src/Eve-O-Preview/Eve-O-Preview.csproj

