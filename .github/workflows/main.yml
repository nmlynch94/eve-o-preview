name: Build with Cake

on:
  push:
    branches:
      - linux-build
  pull_request:
    branches:
      - linux-build
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '6.0.x'  # Adjust this to your target .NET version

      - name: Install Cake Tool
        run: dotnet tool install --global Cake.Tool

      - name: Restore Cake tools
        run: dotnet cake --version

      - name: Run Cake build
        run: dotnet cake build.cake --target=Default
