name: Build .NET Framework 4.5

on:
  workflow_dispatch:

jobs:
  build:
    name: Build .NET Framework 4.5
    runs-on: windows-latest

    steps:
      # Checkout the code
      - name: Checkout code
        uses: actions/checkout@v3

      # Setup MSBuild
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v1

      # Setup NuGet
      - name: Setup NuGet
        uses: NuGet/setup-nuget@v1

      # Restore NuGet packages
      - name: Restore NuGet packages
        run: nuget restore src/EVE-O-Preview.sln

      # Build the project
      - name: Build solution
        run: msbuild src/EVE-O-Preview.sln /p:Configuration=Release /p:TargetFrameworkVersion=v4.5

      # Optional: Publish artifacts
      - name: Publish artifacts
        if: success()
        uses: actions/upload-artifact@v3
        with:
          name: build-output
          path: |
            **/bin/Release/
